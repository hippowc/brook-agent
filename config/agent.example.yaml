# 与 pkg/agentconfig 对齐的示例配置（复制为 agent.yaml 并按环境修改）
#
# 模式与 mode_config 详解：doc/agent-configuration-guide.md
# 源码字段定义：pkg/agentconfig/types.go、校验：pkg/agentconfig/validate.go

version: "1"

agent:
  mode: react
  name: "brook-assistant"
  description: "可配置示例 Agent（ReAct + 本地文件工具）"
  # instruction / user_prompt：可写多行文本；若整段为 @路径 则加载该文件内容（Markdown 等），路径相对 agent.yaml 所在目录或绝对路径。
  # 示例：instruction: "@prompts/system.md"
  instruction: |
    你是 Brook 助手。工作目录为会话配置的工作目录；仅使用已提供的工具完成任务。
  user_prompt: ""
  max_iterations: 24
  working_directory: "/tmp/brook-workspace"

  tools:
    filesystem:
      enabled: true
      backend: local
      shell: true
      streaming_shell: false
      local:
        # true 时仅允许少量 shell 命令（含 find/head/tail 等，便于 Deep 模式遍历仓库）；需任意命令请改为 false
        strict_commands: true
    return_directly: {}

  middlewares: []

  mode_config: null

models:
  providers:
    openai:
      driver: openai
      api_key_env: "OPENAI_API_KEY"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      extra:
        temperature: 0.2
    ollama:
      driver: ollama
      api_key_env: ""
      base_url: "http://127.0.0.1:11434"
      extra: {}

  active:
    provider: openai
    model: "qwen3.5-flash"

memory:
  # session_store=file 时须填写绝对路径；持久化到用户目录可设为例如 /Users/you/.brook/session
  session_store: file
  session_file_path: "/tmp/brook-session"
  # TUI 多轮对话：注入模型前对消息条数做尾部裁剪（0 表示不裁剪）。存档仍完整写入 ~/.brook/conversations/<uuid>.json
  max_context_messages: 50
  output_key: "last_answer"

observability:
  global_handlers: []
  log_level: "info"

interrupt:
  enabled: true
  checkpoint_backend: file
  checkpoint_file_path: "/tmp/brook-checkpoints"

a2ui:
  enabled: false
  version: "0.8"
